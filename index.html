<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun Deep | RGB Pulse Player</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

    <style>
        /* --- DYNAMIC COLOR ANIMATION --- */
        @keyframes rgbGlow {
            0% { border-color: #00fff2; box-shadow: 0 0 20px #00fff2; color: #00fff2; }
            33% { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; color: #ff00ff; }
            66% { border-color: #ffff00; box-shadow: 0 0 20px #ffff00; color: #ffff00; }
            100% { border-color: #00fff2; box-shadow: 0 0 20px #00fff2; color: #00fff2; }
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            background: #050505; color: white; font-family: 'Poppins', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%; animation: bgShift 10s ease infinite;
        }
        
        .player { 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); 
            padding: 40px; border-radius: 40px; width: 310px; text-align: center;
            border: 2px solid #00fff2; 
            animation: rgbGlow 8s linear infinite; /* Player border glows & changes */
        }

        .app-logo {
            font-size: 11px; font-weight: 900; letter-spacing: 5px; margin-bottom: 25px;
            opacity: 0.8; text-transform: uppercase; color: #fff;
        }

        #cover { 
            width: 200px; height: 200px; border-radius: 50%; object-fit: cover; 
            border: 4px solid #fff; transition: 0.5s; margin-bottom: 20px;
        }
        
        .playing #cover { 
            animation: rotate 10s linear infinite;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        @keyframes rotate { from { transform: rotate(0deg) scale(1.05); } to { transform: rotate(360deg) scale(1.05); } }

        h2 { font-size: 20px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* --- GLOWING BUTTONS --- */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; }
        
        button, .file-label { 
            cursor: pointer; background: rgba(0,0,0,0.5); 
            border: 2px solid #00fff2; color: #00fff2;
            width: 50px; height: 50px; border-radius: 50%;
            font-size: 18px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
            /* Button Glow Animation */
            animation: rgbGlow 8s linear infinite; 
        }

        .btn-main { 
            width: 75px; height: 75px; font-size: 24px;
            background: white; color: black !important; /* Stand out */
            border: none; animation: none; 
            box-shadow: 0 0 30px #fff;
        }

        button:hover, .file-label:hover { transform: scale(1.15); filter: brightness(1.5); }

        /* --- PROGRESS BAR --- */
        .progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); margin: 25px 0; border-radius: 10px; cursor: pointer; overflow: hidden;}
        .progress-bar { height: 100%; width: 0%; background: #00fff2; animation: rgbGlow 8s linear infinite; border: none; box-shadow: none; }

        #visualizer { width: 100%; height: 40px; filter: drop-shadow(0 0 8px #00fff2); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="player" id="player-div">
        <div class="app-logo">ARUNDEEP LIVE</div>
        <img src="levels.jpeg" id="cover">
        <h2 id="title">LEVELS</h2>

        <canvas id="visualizer"></canvas>
        
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <audio id="main-audio" src="music/Levels.mp3" crossorigin="anonymous"></audio> 
        
        <div class="controls">
            <label class="file-label"><i class="fa-solid fa-plus"></i><input type="file" id="file-input" accept="audio/*"></label>
            <button onclick="prevSong()"><i class="fa-solid fa-backward"></i></button>
            <button class="btn-main" id="play-btn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
            <button onclick="nextSong()"><i class="fa-solid fa-forward"></i></button>
            <button onclick="downloadSong()"><i class="fa-solid fa-download"></i></button>
        </div>
    </div>

    <script>
        const audio = document.getElementById("main-audio");
        const title = document.getElementById("title");
        const cover = document.getElementById("cover");
        const progressBar = document.getElementById("progress-bar");
        const playBtn = document.getElementById("play-btn");
        const playerDiv = document.getElementById("player-div");
        const fileInput = document.getElementById("file-input");
        const canvas = document.getElementById("visualizer");
        const ctx = canvas.getContext("2d");

        let songs = [
            { name: "LEVELS", path: "music/Levels.mp3", img: "levels.jpeg" },
            { name: "INVINCIBLE", path: "music/Invincible_1.mp3", img: "invincible.jpeg" }
        ];

        let index = 0; let isPlaying = false;
        let audioContext, analyzer, source;

        function setupVisualizer() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyzer = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyzer);
            analyzer.connect(audioContext.destination);
            analyzer.fftSize = 64;
            draw();
        }

        function draw() {
            const bufferLength = analyzer.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyzer.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let barWidth = (canvas.width / bufferLength) * 2;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                let barHeight = dataArray[i] / 4;
                ctx.fillStyle = isPlaying ? (i % 2 === 0 ? '#00fff2' : '#ff00ff') : '#444';
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
                x += barWidth;
            }
            requestAnimationFrame(draw);
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const fileURL = URL.createObjectURL(file);
            window.jsmediatags.read(file, {
                onSuccess: function(tag) {
                    let art = "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=300";
                    const pic = tag.tags.picture;
                    if (pic) {
                        let base64 = "";
                        for (let i = 0; i < pic.data.length; i++) base64 += String.fromCharCode(pic.data[i]);
                        art = `data:${pic.format};base64,${window.btoa(base64)}`;
                    }
                    songs.push({ name: file.name.split('.')[0], path: fileURL, img: art });
                    index = songs.length - 1; loadSong(songs[index]); playSong();
                }
            });
        });

        function togglePlay() { 
            setupVisualizer();
            if (audioContext.state === 'suspended') audioContext.resume();
            isPlaying ? pauseSong() : playSong(); 
        }

        function playSong() {
            isPlaying = true;
            playerDiv.classList.add('playing');
            playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            audio.play();
        }

        function pauseSong() {
            isPlaying = false;
            playerDiv.classList.remove('playing');
            playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            audio.pause();
        }

        function loadSong(s) { title.innerText = s.name; cover.src = s.img; audio.src = s.path; }
        function nextSong() { index = (index + 1) % songs.length; loadSong(songs[index]); playSong(); }
        function prevSong() { index = (index - 1 + songs.length) % songs.length; loadSong(songs[index]); playSong(); }
        function downloadSong() { const a = document.createElement('a'); a.href = audio.src; a.download = title.innerText; a.click(); }

        audio.ontimeupdate = (e) => {
            const { duration, currentTime } = e.srcElement;
            if (duration) progressBar.style.width = `${(currentTime / duration) * 100}%`;
        };
        audio.onended = nextSong;
    </script>
</body>
</html>
