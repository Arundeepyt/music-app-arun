<script>
    const audio = document.getElementById("main-audio");
    const title = document.getElementById("title");
    const cover = document.getElementById("cover");
    const progressBar = document.getElementById("progress-bar");
    const playBtn = document.getElementById("play-btn");

    // I added several common ways you might have named the file
    const songs = [
        { 
            name: "LEVELS", 
            path: "music/Levels.mp3", 
            img: "levels.jpeg" 
        },
        { 
            name: "INVINCIBLE", 
            path: "music/invincible_1.mp3", // Try this first
            img: "invincible.jpeg" 
        }
    ];

    let index = 0;
    let isPlaying = false;

    function loadSong(song) {
        title.innerText = song.name;
        cover.src = song.img;
        audio.src = song.path;
        console.log("Attempting to load: " + song.path);
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playBtn.innerText = "▶";
        } else {
            audio.play().catch(error => {
                console.log("Playback failed. Checking for naming errors...");
                // If invincible_1.mp3 fails, try a different version automatically
                if(index === 1) {
                    audio.src = "music/Invincible_1.mp3"; // Try with Capital I
                    audio.play().catch(e => alert("Could not find the file. Check your GitHub music folder spelling!"));
                }
            });
            isPlaying = true;
            playBtn.innerText = "⏸";
        }
    }

    function nextSong() {
        index = (index + 1) % songs.length;
        loadSong(songs[index]);
        // Reset play state to ensure it tries to play the new source
        isPlaying = false; 
        togglePlay();
    }

    function prevSong() {
        index = (index - 1 + songs.length) % songs.length;
        loadSong(songs[index]);
        isPlaying = false;
        togglePlay();
    }

    audio.ontimeupdate = (e) => {
        const { duration, currentTime } = e.srcElement;
        if (duration) progressBar.style.width = `${(currentTime / duration) * 100}%`;
    };

    audio.onended = nextSong;
</script>
