<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun Music Pro</title>
    <style>
        /* 1. DARK NEON BACKGROUND */
        body {
            background: #080808;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 2. GLASSMORPHISM PLAYER */
        .player {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 
                        0 0 30px rgba(0, 200, 255, 0.2);
            width: 320px;
        }

        img {
            width: 220px;
            height: 220px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        img:hover { transform: scale(1.05); }

        h2 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: #00fff2; /* Cyberpunk Cyan */
            text-shadow: 0 0 10px #00fff2;
        }

        /* 3. CYBERPUNK PROGRESS LINE */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin: 30px 0;
            cursor: pointer;
            position: relative;
            border-radius: 2px;
        }

        .progress-bar {
            height: 100%;
            width: 0%; /* Updates with JS */
            background: #00fff2;
            box-shadow: 0 0 15px #00fff2, 0 0 5px #fff;
            border-radius: 2px;
            position: relative;
            transition: width 0.1s linear;
        }

        /* The Laser Tip */
        .progress-bar::after {
            content: '';
            position: absolute;
            right: -2px;
            top: -4px;
            width: 4px;
            height: 12px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        /* 4. ANIMATED COLORFUL BUTTONS */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 15px 20px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 50%;
            color: white;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 5s ease infinite;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
        }

        button:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 20px rgba(35, 166, 213, 0.4);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div class="player">
        <img src="levels.jpeg" id="cover">
        <h2 id="title">LEVELS</h2>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <audio id="main-audio" src="music/levels.mp3"></audio>

        <div class="controls">
            <button onclick="playSong()">▶</button>
            <button onclick="pauseSong()">⏸</button>
            <button onclick="nextSong()">⏭</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById("main-audio");
        const title = document.getElementById("title");
        const cover = document.getElementById("cover");
        const progressBar = document.getElementById("progress-bar");
        const progressContainer = document.getElementById("progress-container");

        const songs = [
            { name: "LEVELS", path: "music/levels.mp3", img: "levels.jpeg" },
            { name: "SONG TWO", path: "music/song2.mp3", img: "cover2.jpg" }
        ];

        let index = 0;

        // --- CYBER PROGRESS LOGIC ---
        // Updates the line as song plays
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + "%";
            }
        });

        // Click to seek on the line
        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });

        // --- YOUR ORIGINAL FUNCTIONS ---
        function playSong() {
            audio.play().catch(e => console.log("Press play again after page loads"));
        }

        function pauseSong() {
            audio.pause();
        }

        function nextSong() {
            index = (index + 1) % songs.length;
            title.innerText = songs[index].name;
            cover.src = songs[index].img;
            audio.src = songs[index].path;
            audio.play();
        }

        // Auto-next when song ends
        audio.onended = nextSong;
    </script>
</body>
</html>
