<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arundeep | Aesthetic Player</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

    <style>
        :root {
            --accent: #00fff2;
            --bg: #0a0a0c;
            --panel: rgba(20, 20, 25, 0.7);
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0c 100%);
        }
        
        .player { 
            background: var(--panel); 
            backdrop-filter: blur(30px); 
            padding: 40px; 
            border-radius: 50px; 
            width: 300px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); 
            text-align: center;
        }

        .app-logo {
            font-size: 10px; font-weight: 700; letter-spacing: 8px; margin-bottom: 30px;
            opacity: 0.5; text-transform: uppercase;
        }

        /* --- AESTHETIC COVER ART --- */
        .img-area {
            position: relative;
            width: 240px; height: 240px;
            margin: 0 auto 30px;
        }

        #cover { 
            width: 100%; height: 100%; border-radius: 40px; 
            object-fit: cover; 
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        
        .playing #cover { 
            transform: scale(1.05); 
            box-shadow: 0 20px 50px rgba(0, 255, 242, 0.2); 
        }

        h2 { font-weight: 500; font-size: 18px; margin: 0; letter-spacing: -0.5px; }
        p#artist { font-size: 12px; opacity: 0.4; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- MINIMAL PROGRESS --- */
        .progress-container { 
            width: 100%; height: 4px; background: rgba(255, 255, 255, 0.05); 
            margin: 35px 0 25px; cursor: pointer; border-radius: 10px; position: relative;
        }
        .progress-bar { 
            height: 100%; width: 0%; background: var(--accent); 
            border-radius: 10px; box-shadow: 0 0 15px var(--accent);
            transition: width 0.1s linear;
        }

        /* --- SOFT CONTROLS --- */
        .controls { display: flex; justify-content: space-between; align-items: center; }
        
        button, .file-label { 
            cursor: pointer; background: none; border: none; color: white; 
            font-size: 18px; transition: 0.3s; opacity: 0.6;
        }

        .file-label { display: flex; align-items: center; justify-content: center; }

        .btn-main { 
            width: 70px; height: 70px; border-radius: 50%; opacity: 1;
            background: white; color: black; font-size: 20px;
            box-shadow: 0 10px 25px rgba(255,255,255,0.2);
        }

        button:hover, .file-label:hover { opacity: 1; transform: translateY(-2px); }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(255,255,255,0.3); }
        
        input[type="file"] { display: none; }

        /* VISUALIZER WAVE */
        #visualizer { width: 100%; height: 30px; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="player" id="player-div">
        <div class="app-logo">Arundeep Music</div>

        <div class="img-area">
            <img src="levels.jpeg" id="cover">
        </div>

        <h2 id="title">LEVELS</h2>
        <p id="artist">Now Playing</p>

        <canvas id="visualizer"></canvas>
        
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <audio id="main-audio" src="music/Levels.mp3" crossorigin="anonymous"></audio> 
        
        <div class="controls">
            <label class="file-label"><i class="fa-solid fa-plus"></i><input type="file" id="file-input" accept="audio/*"></label>
            <button onclick="prevSong()"><i class="fa-solid fa-backward-step"></i></button>
            <button class="btn-main" id="play-btn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
            <button onclick="nextSong()"><i class="fa-solid fa-forward-step"></i></button>
            <button onclick="downloadSong()"><i class="fa-solid fa-heart"></i></button>
        </div>
    </div>

    <script>
        const audio = document.getElementById("main-audio");
        const title = document.getElementById("title");
        const cover = document.getElementById("cover");
        const progressBar = document.getElementById("progress-bar");
        const playBtn = document.getElementById("play-btn");
        const playerDiv = document.getElementById("player-div");
        const fileInput = document.getElementById("file-input");
        const canvas = document.getElementById("visualizer");
        const ctx = canvas.getContext("2d");

        let songs = [
            { name: "LEVELS", path: "music/Levels.mp3", img: "levels.jpeg" },
            { name: "INVINCIBLE", path: "music/Invincible_1.mp3", img: "invincible.jpeg" }
        ];

        let index = 0; let isPlaying = false;
        let audioContext, analyzer, source;

        function setupVisualizer() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyzer = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyzer);
            analyzer.connect(audioContext.destination);
            analyzer.fftSize = 128;
            draw();
        }

        function draw() {
            const bufferLength = analyzer.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyzer.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let barWidth = (canvas.width / bufferLength) * 2.5;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                let barHeight = dataArray[i] / 6;
                ctx.fillStyle = `rgba(255, 255, 255, ${barHeight / 50})`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
            requestAnimationFrame(draw);
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const fileURL = URL.createObjectURL(file);
            window.jsmediatags.read(file, {
                onSuccess: function(tag) {
                    let art = "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=300";
                    const pic = tag.tags.picture;
                    if (pic) {
                        let base64 = "";
                        for (let i = 0; i < pic.data.length; i++) base64 += String.fromCharCode(pic.data[i]);
                        art = `data:${pic.format};base64,${window.btoa(base64)}`;
                    }
                    songs.push({ name: file.name.split('.')[0], path: fileURL, img: art });
                    index = songs.length - 1; loadSong(songs[index]); playSong();
                },
                onError: () => { 
                    songs.push({ name: file.name.split('.')[0], path: fileURL, img: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=300" });
                    index = songs.length - 1; loadSong(songs[index]); playSong();
                }
            });
        });

        function togglePlay() { 
            setupVisualizer();
            if (audioContext.state === 'suspended') audioContext.resume();
            isPlaying ? pauseSong() : playSong(); 
        }

        function playSong() {
            isPlaying = true;
            playerDiv.classList.add('playing');
            playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            audio.play();
        }

        function pauseSong() {
            isPlaying = false;
            playerDiv.classList.remove('playing');
            playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            audio.pause();
        }

        function loadSong(s) { title.innerText = s.name; cover.src = s.img; audio.src = s.path; }
        function nextSong() { index = (index + 1) % songs.length; loadSong(songs[index]); playSong(); }
        function prevSong() { index = (index - 1 + songs.length) % songs.length; loadSong(songs[index]); playSong(); }

        audio.ontimeupdate = (e) => {
            const { duration, currentTime } = e.srcElement;
            if (duration) progressBar.style.width = `${(currentTime / duration) * 100}%`;
        };
        audio.onended = nextSong;
    </script>
</body>
</html>
