<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun Music Pro</title>
    <style>
        body { background: #080808; color: white; text-align: center; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .player { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; width: 320px; border: 1px solid rgba(255, 255, 255, 0.1); }
        img { width: 220px; height: 220px; border-radius: 20px; object-fit: cover; margin-bottom: 20px; }
        .progress-container { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); margin: 30px 0; cursor: pointer; border-radius: 10px; }
        .progress-bar { height: 100%; width: 0%; background: #00fff2; box-shadow: 0 0 15px #00fff2; border-radius: 10px; transition: width 0.1s linear; }
        button { padding: 15px; font-size: 20px; cursor: pointer; border: none; border-radius: 50%; width: 60px; height: 60px; margin: 0 5px; background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: grad 5s infinite; color: white; }
        @keyframes grad { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
    </style>
</head>
<body>

    <div class="player">
        <img src="levels.jpeg" id="cover">
        <h2 id="title">LEVELS</h2>
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <audio id="main-audio" src="music/Levels.mp3"></audio> 
        
        <div class="controls">
            <button onclick="playSong()">▶</button>
            <button onclick="pauseSong()">⏸</button>
            <button onclick="nextSong()">⏭</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById("main-audio");
        const title = document.getElementById("title");
        const cover = document.getElementById("cover");
        const progressBar = document.getElementById("progress-bar");

        // UPDATED FOLDER PATH HERE TOO
        const songs = [
            { name: "LEVELS", path: "music/Levels.mp3", img: "levels.jpeg" }
        ];

        let index = 0;

        audio.ontimeupdate = (e) => {
            const { duration, currentTime } = e.srcElement;
            if (duration) {
                // Fixed the backticks here
                progressBar.style.width = `${(currentTime / duration) * 100}%`;
            }
        };

        function playSong() { audio.play(); }
        function pauseSong() { audio.pause(); }
        function nextSong() {
            index = (index + 1) % songs.length;
            title.innerText = songs[index].name;
            cover.src = songs[index].img;
            audio.src = songs[index].path;
            audio.play();
        }
    </script>
</body>
</html>
